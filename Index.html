// ─── IMAGE MODAL ──────────────────────────────────────────────────────────────
function ImageModal({ image, onClose }) {
  useEffect(() => {
    const h = (e) => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, [onClose]);
  if (!image) return null;
  return (
    <div onClick={onClose} style={{
      position:"fixed",inset:0,zIndex:9999,background:"rgba(5,5,10,0.97)",
      backdropFilter:"blur(20px)",display:"flex",flexDirection:"column",
      alignItems:"center",justifyContent:"center",padding:24,cursor:"zoom-out",
      animation:"modalIn 0.22s ease",
    }}>
      <div onClick={e=>e.stopPropagation()} style={{maxWidth:960,width:"100%",cursor:"default"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{
              fontFamily:"'DM Mono',monospace",fontSize:10,letterSpacing:2,
              color:image.badgeColor,background:`${image.badgeColor}22`,
              border:`1px solid ${image.badgeColor}55`,padding:"3px 10px",
              borderRadius:4,textTransform:"uppercase",
            }}>{image.badge}</span>
            <span style={{fontFamily:"'DM Mono',monospace",color:"#D9A8BC",fontSize:10,letterSpacing:1}}>
              Dr. Fabrício Marinho · CRMV-RN 0631 · 05/05/2026
            </span>
          </div>
          <button onClick={onClose} style={{
            background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.15)",
            borderRadius:"50%",width:38,height:38,cursor:"pointer",
            color:"#FFF8FB",fontSize:20,display:"flex",alignItems:"center",justifyContent:"center",
          }}>×</button>
        </div>
        <div style={{
          borderRadius:12,overflow:"hidden",border:`1px solid ${image.badgeColor}44`,
          boxShadow:`0 0 60px ${image.badgeColor}22`,background:"#050a0e",
        }}>
          <img src={image.src} alt={image.title}
            style={{width:"100%",maxHeight:"52vh",objectFit:"contain",display:"block"}}/>
        </div>
        <div style={{marginTop:14,display:"grid",gridTemplateColumns:"1fr 2fr",gap:12}}>
          <div style={{
            background:"rgba(255,255,255,0.04)",border:`1px solid ${image.badgeColor}33`,
            borderRadius:8,padding:"14px 16px",
          }}>
            <p style={{fontFamily:"'DM Mono',monospace",color:image.badgeColor,fontSize:9,letterSpacing:2,textTransform:"uppercase",margin:"0 0 5px"}}>{image.title}</p>
            <p style={{fontFamily:"'Playfair Display',serif",color:"#f0ece5",fontSize:"1rem",fontWeight:700,margin:"0 0 3px"}}>{image.subtitle}</p>
            <div style={{borderTop:"1px solid rgba(255,255,255,0.08)",paddingTop:8,marginTop:8}}>
              <p style={{fontFamily:"'DM Mono',monospace",color:"#70d0a0",fontSize:9,letterSpacing:1.5,textTransform:"uppercase",margin:"0 0 3px"}}>Achado</p>
              <p style={{fontFamily:"'Lora',serif",color:"#FFF8FB",fontSize:"0.85rem",margin:0}}>{image.finding}</p>
            </div>
          </div>
          <div style={{
            background:"rgba(255,255,255,0.03)",border:`1px solid rgba(255,255,255,0.08)`,
            borderLeft:`3px solid ${image.badgeColor}`,borderRadius:8,padding:"14px 18px",
          }}>
            <p style={{fontFamily:"'DM Mono',monospace",color:"#D9A8BC",fontSize:9,letterSpacing:2,textTransform:"uppercase",margin:"0 0 8px"}}>Interpretação Clínica</p>
            <p style={{fontFamily:"'Lora',serif",color:"#EFC7D8",fontSize:"0.9rem",lineHeight:1.75,margin:0}}>{image.interpretation}</p>
          </div>
        </div>
        <p style={{fontFamily:"'DM Mono',monospace",color:"#D9A8BC",fontSize:9,letterSpacing:1.5,textAlign:"center",marginTop:12,opacity:0.5}}>
          ESC · CLIQUE FORA · × PARA FECHAR
        </p>
      </div>
    </div>
  );
}

// ─── ECO CARD ─────────────────────────────────────────────────────────────────
function EcoCard({ image, onExpand, index }) {
  const [hover, setHover] = useState(false);
  return (
    <div onClick={()=>onExpand(image)}
      onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)}
      style={{
        background:"rgba(10,15,20,0.85)",
        border:`1px solid ${hover ? image.badgeColor+"66" : "rgba(255,255,255,0.08)"}`,
        borderRadius:10,overflow:"hidden",cursor:"zoom-in",
        transition:"all 0.22s ease",

// ─── AUDIENCE QUESTION COMPONENT ─────────────────────────────────────────────
// Scroll-free: resposta vira destaque inline, sem precisar rolar
function AudienceQuestion({ question, options, correctIndex, selected, onSelect, explanation, tips }) {
  const colors = ["#D96C9D","#F4B6CC","#5cb8e0","#70d0a0"];
  const isAnswered = selected !== null;
  const isCorrect = isAnswered && selected === correctIndex;
  return (
    <div style={{width:"100%",maxWidth:700}}>
      <div style={{
        background:"rgba(255,255,255,0.04)",border:"1px solid rgba(240,160,112,0.25)",
        borderRadius:12,padding:"16px 20px",marginBottom:18,textAlign:"center",
      }}>
        <p style={{fontFamily:"'Lora',serif",color:"#FFF8FB",fontSize:"clamp(0.9rem,1.8vw,1.1rem)",lineHeight:1.7,margin:0}}>{question}</p>
      </div>
      {!isAnswered ? (
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          {options.map((opt,i)=>(
            <button key={i} onClick={()=>onSelect(i)} style={{
              background:"rgba(255,255,255,0.03)",border:`2px solid ${colors[i]}44`,
              borderRadius:10,padding:"14px 14px",cursor:"pointer",color:"#FFF8FB",
              fontFamily:"'Lora',serif",fontSize:"0.88rem",lineHeight:1.5,
              textAlign:"left",transition:"all 0.2s",
            }}
              onMouseEnter={e=>{e.currentTarget.style.background=`${colors[i]}14`;e.currentTarget.style.borderColor=`${colors[i]}88`;}}
              onMouseLeave={e=>{e.currentTarget.style.background="rgba(255,255,255,0.03)";e.currentTarget.style.borderColor=`${colors[i]}44`;}}
            >
              <span style={{fontFamily:"'DM Mono',monospace",fontSize:9,display:"block",marginBottom:4,letterSpacing:1,color:colors[i]}}>OPÇÃO {String.fromCharCode(65+i)}</span>
              {opt}
            </button>
          ))}
        </div>
      ) : (
        // Após responder: mostra resultado + explicação SEM scroll
        <div style={{animation:"fadeIn 0.35s ease"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
            {options.map((opt,i)=>{
              let bg="rgba(255,255,255,0.02)",border=`2px solid ${colors[i]}22`,color="#D9A8BC";
              if(i===correctIndex){bg="rgba(112,208,160,0.15)";border="2px solid #70d0a0";color="#70d0a0";}
              else if(selected===i&&!isCorrect){bg="rgba(224,92,92,0.15)";border="2px solid #e05c5c";color="#e05c5c";}
              return (
                <div key={i} style={{background:bg,border,borderRadius:10,padding:"12px 14px",opacity:i!==correctIndex&&selected!==i?0.4:1}}>
                  <span style={{fontFamily:"'DM Mono',monospace",fontSize:9,display:"block",marginBottom:4,letterSpacing:1,color}}>
                    {i===correctIndex?"✓ CORRETA":selected===i?"✗ SUA RESPOSTA":`OPÇÃO ${String.fromCharCode(65+i)}`}
                  </span>
                  <span style={{fontFamily:"'Lora',serif",fontSize:"0.85rem",color,lineHeight:1.4}}>{opt}</span>
                </div>
              );
            })}
          </div>
          {/* Explicação inline, compacta */}
          <div style={{
            background:isCorrect?"rgba(112,208,160,0.12)":"rgba(244,182,204,0.1)",
            border:`1px solid ${isCorrect?"#70d0a0":"#F4B6CC"}`,
            borderLeft:`4px solid ${isCorrect?"#70d0a0":"#F4B6CC"}`,
            borderRadius:8,padding:"12px 16px",
          }}>
            <p style={{fontFamily:"'DM Mono',monospace",color:isCorrect?"#70d0a0":"#F4B6CC",fontSize:10,letterSpacing:2,textTransform:"uppercase",margin:"0 0 6px"}}>
              {isCorrect?"✓ Excelente raciocínio!":"✗ Veja o raciocínio clínico:"}
            </p>
            <p style={{fontFamily:"'Lora',serif",color:"#FFF8FB",fontSize:"0.86rem",lineHeight:1.65,margin:0}}>{explanation}</p>
          </div>
          {tips&&tips.length>0&&(
            <div style={{marginTop:10,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(217,168,188,0.15)",borderRadius:8,padding:"10px 14px"}}>
              <p style={{fontFamily:"'DM Mono',monospace",color:"#D9A8BC",fontSize:9,letterSpacing:1.5,textTransform:"uppercase",margin:"0 0 6px"}}>📌 Para lembrar:</p>
              {tips.map((tip,i)=>(
                <p key={i} style={{fontFamily:"'Lora',serif",color:"#EFC7D8",fontSize:"0.81rem",lineHeight:1.55,margin:i<tips.length-1?"0 0 4px":0}}>• {tip}</p>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

      <Tag color="#F4B6CC">Brincadeira · Qual o Achado?</Tag>
      <SlideTitle>Você consegue identificar?</SlideTitle>

      <div style={{maxWidth:760,width:"100%",display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,marginTop:12}}>
        {/* Imagem */}
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div style={{
            background:"#050a0e",borderRadius:12,overflow:"hidden",
            border:`1px solid ${isRevealed?card.cor+"66":"rgba(255,255,255,0.1)"}`,
            boxShadow:isRevealed?`0 0 30px ${card.cor}22`:"none",
            transition:"all 0.3s",
          }}>
            <img src={card.src} alt="eco" style={{width:"100%",height:220,objectFit:"cover",display:"block"}}/>
            <div style={{padding:"8px 12px",background:"rgba(0,0,0,0.5)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontFamily:"'DM Mono',monospace",color:"#D9A8BC",fontSize:9,letterSpacing:1}}>{card.title}</span>
              <span style={{fontFamily:"'DM Mono',monospace",color:card.badgeColor,fontSize:9,background:`${card.badgeColor}22`,padding:"2px 8px",borderRadius:3}}>{card.badge}</span>
            </div>
          </div>
          {/* Navegação entre imagens */}
          <div style={{display:"flex",gap:6,justifyContent:"center",flexWrap:"wrap"}}>
            {cards.map((c,i)=>(
              <div key={c.id} onClick={()=>setCurrent(i)} style={{
                width:10,height:10,borderRadius:"50%",cursor:"pointer",
                background:i===current?card.cor:revealed[c.id]?"#70d0a044":"rgba(255,255,255,0.15)",
                border:i===current?`2px solid ${card.cor}`:"2px solid transparent",
                transition:"all 0.2s",
              }}/>
            ))}
          </div>
          <div style={{display:"flex",gap:8,justifyContent:"center"}}>
            <button onClick={()=>setCurrent(c=>Math.max(0,c-1))} disabled={current===0} style={{
              background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",
              borderRadius:6,padding:"5px 12px",cursor:current===0?"default":"pointer",
              color:current===0?"#444":"#D9A8BC",fontFamily:"'DM Mono',monospace",fontSize:10,
            }}>← Anterior</button>
            <button onClick={()=>setCurrent(c=>Math.min(cards.length-1,c+1))} disabled={current===cards.length-1} style={{
              background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",
              borderRadius:6,padding:"5px 12px",cursor:current===cards.length-1?"default":"pointer",
              color:current===cards.length-1?"#444":"#D9A8BC",fontFamily:"'DM Mono',monospace",fontSize:10,
            }}>Próxima →</button>
          </div>
        </div>

        {/* Lado direito — revelar */}
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div style={{
            background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",
            borderRadius:10,padding:"16px",flex:1,display:"flex",flexDirection:"column",justifyContent:"center",
          }}>
            {!isRevealed ? (
              <div style={{textAlign:"center"}}>
                <p style={{fontFamily:"'Playfair Display',serif",color:"#D9A8BC",fontSize:"1.1rem",fontStyle:"italic",margin:"0 0 8px"}}>Que janela do eco é essa?</p>
                <p style={{fontFamily:"'DM Mono',monospace",color:"#D9A8BC",fontSize:9,letterSpacing:1.5,margin:"0 0 20px",textTransform:"uppercase",opacity:0.6}}>
                  {Object.keys(revealed).length}/{cards.length} revelados
                </p>
                <button onClick={()=>setRevealed(r=>({...r,[card.id]:true}))} style={{
                  background:`${card.cor}22`,border:`2px solid ${card.cor}`,
                  borderRadius:10,padding:"12px 28px",cursor:"pointer",
                  color:card.cor,fontFamily:"'DM Mono',monospace",fontSize:11,
                  letterSpacing:2,textTransform:"uppercase",transition:"all 0.2s",
                }}
                  onMouseEnter={e=>{e.currentTarget.style.background=`${card.cor}44`;}}
                  onMouseLeave={e=>{e.currentTarget.style.background=`${card.cor}22`;}}
                >🔍 Revelar</button>
              </div>
            ) : (
              <div style={{animation:"fadeIn 0.35s ease"}}>
                <div style={{background:`${card.cor}15`,border:`1px solid ${card.cor}44`,borderRadius:8,padding:"12px 14px",marginBottom:12}}>
                  <p style={{fontFamily:"'DM Mono',monospace",color:card.cor,fontSize:9,letterSpacing:2,textTransform:"uppercase",margin:"0 0 4px"}}>✓ Achado</p>
                  <p style={{fontFamily:"'Playfair Display',serif",color:"#FFF8FB",fontSize:"1rem",fontWeight:700,margin:0}}>{card.reveal}</p>
                </div>
                <p style={{fontFamily:"'Lora',serif",color:"#EFC7D8",fontSize:"0.86rem",lineHeight:1.7,margin:"0 0 12px"}}>{card.desc}</p>
                {current < cards.length-1 && (
                  <button onClick={()=>setCurrent(c=>c+1)} style={{
                    background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.15)",
                    borderRadius:8,padding:"8px 16px",cursor:"pointer",color:"#D9A8BC",
                    fontFamily:"'DM Mono',monospace",fontSize:10,letterSpacing:1,width:"100%",
                  }}>Próxima imagem →</button>
                )}
              </div>
            )}
          </div>
          <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:8,padding:"10px 14px"}}>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {cards.map((c,i)=>(
                <span key={c.id} style={{
                  fontFamily:"'DM Mono',monospace",fontSize:8,letterSpacing:0.5,
                  color:revealed[c.id]?"#70d0a0":"#555",
                  padding:"2px 6px",borderRadius:3,
                  background:revealed[c.id]?"rgba(112,208,160,0.1)":"transparent",
                }}>{revealed[c.id]?"✓":i+1} {c.badge}</span>
              ))}
            </div>
          </div>
        </div>
      </div>
    </SlideWrapper>
  );
}

const slides = [
  "title","scully","anamnese","exame","achados",
  "audience1","doenca","fisiopatologia","antesdepois","qualochado","eco",
  "estadiamento","medicamentos","tratamento","conclusao","audience2",
  "agradecimentos","artigo",
];
const totalSlides = slides.length;

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [current, setCurrent] = useState(0);
  const [a1, setA1] = useState(null);
  const [a2, setA2] = useState(null);

  const next = useCallback(()=>setCurrent(c=>Math.min(c+1,totalSlides-1)),[]);
  const prev = useCallback(()=>setCurrent(c=>Math.max(c-1,0)),[]);

  useEffect(()=>{
    const h = e => {
      if(e.key==="ArrowRight"||e.key===" "||e.key==="Enter"){e.preventDefault();next();}
      else if(e.key==="ArrowLeft"){e.preventDefault();prev();}
      else if(e.key==="f"||e.key==="F"){
        if(!document.fullscreenElement)document.documentElement.requestFullscreen?.();
        else document.exitFullscreen?.();
      }
    };
    window.addEventListener("keydown",h);
    return ()=>window.removeEventListener("keydown",h);
  },[next,prev]);

  const slideComponents = [
    <TitleSlide/>,            // 0
    <ScullySlide/>,           // 1
    <AnamneseSlide/>,         // 2
    <ExameSlide/>,            // 3
    <AchadosSlide/>,          // 4 — NOVO
    <Audience1 a1={a1} setA1={setA1}/>,  // 5
    <DoencaSlide/>,           // 6
    <FisiopatologiaSlide/>,   // 7
    <AntesDepoisSlide/>,      // 8 — NOVO
    <QualAchadoSlide/>,       // 9 — NOVO
    <EcoSlide/>,              // 10
    <EstadiamentoSlide/>,     // 11
    <MedicamentosSlide/>,     // 12 — NOVO
    <TratamentoSlide/>,       // 13
    <ConclusaoSlide/>,        // 14
    <Audience2 a2={a2} setA2={setA2}/>,  // 15
    <AgradecimentosSlide/>,   // 16
    <ArtigoSlide/>,           // 17
  ];

  return (
    <div style={{position:"relative",minHeight:"100vh",fontFamily:"'Lora',serif"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap');
        *{box-sizing:border-box;}
        body{margin:0;padding:0;background:#1A1318;}
        @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        @keyframes modalIn{from{opacity:0;transform:scale(0.97)}to{opacity:1;transform:scale(1)}}
        @keyframes cardIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        button{outline:none;}
        ::-webkit-scrollbar{width:4px;}
        ::-webkit-scrollbar-track{background:rgba(255,255,255,0.05);}
        ::-webkit-scrollbar-thumb{background:rgba(155,35,53,0.4);border-radius:2px;}
      `}</style>
      <ProgressBar current={current} total={totalSlides}/>
      <div key={current} style={{animation:"fadeIn 0.4s ease"}}>
        {slideComponents[current]}
      </div>
      {/* Navigation */}
      <div style={{
        position:"fixed",bottom:20,left:"50%",transform:"translateX(-50%)",
        display:"flex",alignItems:"center",gap:14,zIndex:200,
        background:"rgba(26,19,24,0.85)",backdropFilter:"blur(8px)",
        border:"1px solid rgba(155,35,53,0.3)",borderRadius:30,padding:"8px 16px",
      }}>
        <NavBtn onClick={prev} dir="prev" disabled={current===0}/>
        <div style={{display:"flex",gap:5,alignItems:"center"}}>
          {slides.map((_,i)=>(
            <div key={i} onClick={()=>setCurrent(i)} style={{
              width:i===current?20:6,height:6,borderRadius:3,cursor:"pointer",
              background:i===current?"#D96C9D":i<current?"rgba(155,35,53,0.5)":"rgba(255,255,255,0.15)",
              transition:"all 0.3s",
            }}/>
          ))}
        </div>
        <span style={{fontFamily:"'DM Mono',monospace",color:"#D9A8BC",fontSize:11,letterSpacing:1,minWidth:48,textAlign:"center"}}>
          {String(current+1).padStart(2,"0")}/{String(totalSlides).padStart(2,"0")}
        </span>
        <NavBtn onClick={next} dir="next" disabled={current===totalSlides-1}/>
      </div>
      <div style={{position:"fixed",bottom:20,right:20,zIndex:200}}>
        <button onClick={()=>{
          if(!document.fullscreenElement)document.documentElement.requestFullscreen?.();
          else document.exitFullscreen?.();
        }} style={{
          background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",
          borderRadius:6,padding:"6px 10px",cursor:"pointer",color:"#D9A8BC",fontSize:11,
          fontFamily:"'DM Mono',monospace",letterSpacing:1,
        }}>[F] FULLSCREEN</button>
      </div>
    </div>
  );
}


ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
